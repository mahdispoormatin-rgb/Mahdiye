# Fly.io configuration.
# `fly launch` will confirm or change the app name and region for you.


primary_region = "fra"   # Frankfurt — closest Fly region to Vienna

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "get"
  path = "/health"
  timeout = "4s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
